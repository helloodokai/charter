version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
          severity: warning
    gosec:
      excludes:
        - G104
        - G204
        - G306
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Sprint
        - fmt.Sprintf
        - (io.Writer).Write
        - (io.Closer).Close

  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 50
  max-same-issues: 5