run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G104
      - G204
      - G306

issues:
  max-issues-per-linter: 50
  max-same-issues: 5